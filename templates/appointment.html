{% extends 'base.html' %}

{% block content %}
    <section>
        <h2>在线预约</h2>
        <p>请填写以下信息，预约我们的中医师进行诊疗服务。</p>
        
        <form method="POST" action="/appointment">
            <div class="form-group">
                <label for="name">姓名</label>
                <input type="text" id="name" name="name" required>
            </div>
            
            <div class="form-group">
                <label for="phone">手机</label>
                <input type="text" id="phone" name="phone" required>
            </div>
            
            <div class="form-group">
                <label for="date">预约日期</label>
                <input type="date" id="date" name="date" required>
            </div>
            
            <div class="form-group">
                <label for="time">预约时间</label>
                <input type="time" id="time" name="time" required>
            </div>
            
            <div class="form-group">
                <label for="doctor">选择中医师</label>
                <select id="doctor" name="doctor" style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 1em;">
                    <option value="">请选择中医师</option>
                    <option value="张医生">张医生 - 擅长内科</option>
                    <option value="李医生">李医生 - 擅长妇科</option>
                    <option value="王医生">王医生 - 擅长针灸</option>
                    <option value="赵医生">赵医生 - 擅长推拿</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="symptoms">症状描述</label>
                <textarea id="symptoms" name="symptoms" rows="4" required></textarea>
            </div>
            
            <input type="submit" value="提交预约">
        </form>
    </section>
    
    <section>
        <h2>预约须知</h2>
        <div class="feature-box">
            <h3>预约流程</h3>
            <ol style="margin-left: 20px; margin-bottom: 15px;">
                <li>填写在线预约表单</li>
                <li>我们的客服人员会在2小时内与您确认预约信息</li>
                <li>按照预约时间前往诊所就诊</li>
                <li>提前15分钟到达诊所，填写相关资料</li>
            </ol>
        </div>
        
        <div class="feature-box">
            <h3>取消预约</h3>
            <p>如需取消预约，请至少提前24小时通知我们，以便我们安排其他患者。</p>
        </div>
        
        <div class="feature-box">
            <h3>诊所地址</h3>
            <p>地址：北京市朝阳区中医街123号</p>
            <p>电话：010-12345678</p>
            <p>营业时间：周一至周日 9:00-18:00</p>
        </div>
    </section>
{% endblock %}
